name: Geo Monitor

on:
  # Triggered exclusively by n8n Workflow A (via dashboard schedule control)
  # or manually from the dashboard Run Now / Trigger Surge buttons.
  # n8n is the sole scheduler — no GitHub cron.
  workflow_dispatch:
    inputs:
      mode:
        description: 'standard or surge'
        default: 'standard'
        required: true
      regions:
        description: 'comma-separated regions (informational only)'
        default: 'us-east,eu-west,ap-southeast,sa-east,me-south,af-south'
        required: false

jobs:

  # ── Step 1: Pick 6 random VPN configs from /proton/ ─────────────────────────
  pick-vpn-configs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Pick 6 random configs
        id: pick
        run: |
          CONFIGS=()
          for f in proton/wg-*.conf; do
            basename=$(basename "$f")
            if [[ "$basename" != *" "* ]]; then
              CONFIGS+=("$basename")
            fi
          done

          TOTAL=${#CONFIGS[@]}
          echo "Available configs: $TOTAL"

          PICK=6
          if [ $TOTAL -lt $PICK ]; then PICK=$TOTAL; fi

          # Fisher-Yates shuffle
          for ((i=TOTAL-1; i>0; i--)); do
            j=$((RANDOM % (i+1)))
            tmp="${CONFIGS[$i]}"
            CONFIGS[$i]="${CONFIGS[$j]}"
            CONFIGS[$j]="$tmp"
          done

          SELECTED=("${CONFIGS[@]:0:$PICK}")

          REGION_NAMES=("us-east" "eu-west" "ap-southeast" "sa-east" "me-south" "af-south")

          JSON="["
          for i in "${!SELECTED[@]}"; do
            CONF="${SELECTED[$i]}"
            REGION="${REGION_NAMES[$i]}"
            COUNTRY=$(echo "$CONF" | sed 's/wg-\([A-Z]*\)-.*/\1/')
            if [ $i -gt 0 ]; then JSON="$JSON,"; fi
            JSON="$JSON{\"conf\":\"$CONF\",\"region\":\"$REGION\",\"country\":\"$COUNTRY\"}"
          done
          JSON="$JSON]"

          echo "Selected: $JSON"
          echo "matrix=$JSON" >> $GITHUB_OUTPUT


  # ── Step 2: Run monitor via each VPN config in parallel ─────────────────────
  monitor:
    needs: pick-vpn-configs
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.pick-vpn-configs.outputs.matrix) }}

    runs-on: ubuntu-latest
    # Timeout: install (~3min) + VPN (~1min) + Playwright run (~3min) + dwell (max 120s = 2min) + push (~1min) = ~10min
    # 15min gives comfortable headroom without risking cancellation during dwell
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ── Install everything BEFORE connecting VPN ──────────────────────────
      # VPN routes ALL traffic — npm/apt must complete first on plain network

      - name: Install WireGuard
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y wireguard resolvconf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      # ── Connect VPN — Playwright runs through ProtonVPN tunnel ────────────

      - name: Connect VPN (${{ matrix.country }})
        id: vpn
        run: |
          echo "Connecting via ${{ matrix.conf }} → ${{ matrix.country }}"
          sudo cp proton/${{ matrix.conf }} /etc/wireguard/wg0.conf

          # Try connecting, retry once on failure
          if ! sudo wg-quick up wg0 2>&1; then
            echo "VPN connect failed, retrying in 5s..."
            sleep 5
            sudo wg-quick down wg0 2>/dev/null || true
            if ! sudo wg-quick up wg0 2>&1; then
              echo "vpn_connected=false" >> $GITHUB_OUTPUT
              echo "VPN failed after retry — will run without VPN"
              exit 0
            fi
          fi

          sleep 3
          ACTUAL=$(curl -s --max-time 10 "http://ip-api.com/json/?fields=query,countryCode" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['query'], d['countryCode'])" \
            2>/dev/null || echo "unknown unknown")
          echo "Outbound IP: $ACTUAL (expected: ${{ matrix.country }})"
          echo "vpn_connected=true" >> $GITHUB_OUTPUT

      - name: Run Playwright monitor
        env:
          REGION: ${{ matrix.region }}
          MODE: ${{ github.event.inputs.mode || 'standard' }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VPN_CONNECTED: ${{ steps.vpn.outputs.vpn_connected }}
        run: node .github/scripts/monitor.js

      - name: Surge parallel checks
        if: ${{ github.event.inputs.mode == 'surge' }}
        env:
          REGION: ${{ matrix.region }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/surge.js

      # ── Disconnect VPN before pushing results ─────────────────────────────
      # Supabase push requires plain network — VPN blocks external DNS

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 2>/dev/null || true

      - name: Push to Supabase
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REGION: ${{ matrix.region }}
          COUNTRY: ${{ matrix.country }}
          VPN_CONF: ${{ matrix.conf }}
          MODE: ${{ github.event.inputs.mode || 'standard' }}
        run: |
          python3 - <<'EOF'
          import json, urllib.request, os, time

          raw = os.environ.get('MONITOR_RESULT', '{}')
          try:
            data = json.loads(raw)
          except Exception:
            data = {}

          try:
            resp = urllib.request.urlopen('http://ip-api.com/json/?fields=query,countryCode', timeout=5).read()
            ip_data = json.loads(resp)
            runner_ip = ip_data.get('query')
          except Exception:
            runner_ip = None

          payload = json.dumps({
            "region":               os.environ['REGION'],
            "status":               1 if data.get('ok') else 0,
            "ttfb_ms":              data.get('ttfb_ms'),
            "content_language":     data.get('content_language'),
            "accept_language_sent": data.get('accept_language_sent'),
            "cf_colo":              data.get('cf_colo'),
            "runner_ip":            runner_ip,
            "mode":                 os.environ.get('MODE', 'standard'),
            "checked_at":           time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            "page_title":           data.get('page_title'),
            "game_iframe_loaded":   data.get('game_iframe_loaded'),
            "js_errors":            json.dumps(data.get('js_errors', [])),
            "page_blocked":         data.get('page_blocked'),
            "render_error":         data.get('render_error'),
            "referrer_used":        data.get('referrer_used'),
            "click_check_done":     data.get('click_check_done'),
            "login_prompt_shown":   data.get('login_prompt_shown'),
            "dwell_crash":          data.get('dwell_crash'),
            "dwell_errors":         data.get('dwell_errors'),
            "dwell_seconds":        data.get('dwell_seconds'),
          }).encode()

          req = urllib.request.Request(
            f"{os.environ['SUPABASE_URL']}/rest/v1/monitor_results",
            data=payload,
            headers={
              'apikey':        os.environ['SUPABASE_KEY'],
              'Authorization': f"Bearer {os.environ['SUPABASE_KEY']}",
              'Content-Type':  'application/json',
              'Prefer':        'return=minimal'
            },
            method='POST'
          )
          urllib.request.urlopen(req)
          print(f"Pushed: region={os.environ['REGION']} country={os.environ['COUNTRY']} vpn={os.environ['VPN_CONF']} ok={data.get('ok')} ttfb={data.get('ttfb_ms')}ms login={data.get('login_prompt_shown')}")
          EOF
