name: Geo Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'standard or surge'
        default: 'standard'
        required: true
      regions:
        description: 'comma-separated regions (informational only)'
        default: 'us-east,eu-west,ap-southeast,sa-east,me-south,af-south'
        required: false

env:
  WORKER_URL: https://geo-monitor-worker.divine-wind-e9a3.workers.dev

jobs:
  monitor:
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: us-east
            runner: ubuntu-latest
          - region: eu-west
            runner: ubuntu-latest
          - region: ap-southeast
            runner: ubuntu-latest
          - region: sa-east
            runner: ubuntu-latest
          - region: me-south
            runner: ubuntu-latest
          - region: af-south
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Run monitor check
        env:
          REGION: ${{ matrix.region }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          RESULT=$(curl -s -X GET "$WORKER_URL" \
            -H "X-Monitor-Region: $REGION" \
            -H "X-Monitor-Mode: $MODE")

          echo "Result: $RESULT"

          if [ "$MODE" = "surge" ]; then
            for i in $(seq 1 19); do
              curl -s "$WORKER_URL" -H "X-Monitor-Region: $REGION" > /dev/null &
            done
            wait
          fi

          echo "MONITOR_RESULT=$RESULT" >> $GITHUB_ENV

      - name: Push to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REGION: ${{ matrix.region }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          python3 - <<'EOF'
          import json, urllib.request, os, time

          raw = os.environ.get('MONITOR_RESULT', '{}')
          try:
            data = json.loads(raw)
          except Exception:
            data = {}

          payload = json.dumps({
            "region": os.environ['REGION'],
            "status": 1 if data.get('ok') else 0,
            "ttfb_ms": data.get('ttfb_ms'),
            "content_language": data.get('content_language'),
            "accept_language_sent": data.get('accept_language_sent'),
            "cf_colo": data.get('cf_colo'),
            "mode": os.environ.get('MODE', 'standard'),
            "checked_at": time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
          }).encode()

          req = urllib.request.Request(
            f"{os.environ['SUPABASE_URL']}/rest/v1/monitor_results",
            data=payload,
            headers={
              'apikey': os.environ['SUPABASE_KEY'],
              'Authorization': f"Bearer {os.environ['SUPABASE_KEY']}",
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            method='POST'
          )
          urllib.request.urlopen(req)
          print(f"Pushed: region={os.environ['REGION']} status={data.get('ok')} ttfb={data.get('ttfb_ms')}ms colo={data.get('cf_colo')}")
          EOF
