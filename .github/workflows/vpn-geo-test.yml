name: VPN Geo Test

# Manual trigger only — does NOT affect monitor.yml
# Reads ProtonVPN WireGuard configs directly from /proton/ in the repo
# SUCCESS = each job shows a different country IP after connecting
#
# Available configs:
#   NL: proton/wg-NL-FREE-31.conf
#   JP: proton/wg-JP-FREE-33.conf  (or wg-JP-FREE-9.conf)
#   CA: proton/wg-CA-FREE-4.conf
#   MX: proton/wg-MX-FREE-6.conf
#   RO: proton/wg-RO-FREE-29.conf
#   SG: proton/wg-SG-FREE-17.conf  (or wg-SG-FREE-9.conf)
#   PL: proton/wg-PL-FREE-9.conf

on:
  workflow_dispatch:

jobs:

  test-nl:
    name: Test Netherlands (NL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: IP before VPN
        run: |
          echo "=== BEFORE VPN ==="
          curl -s https://ipinfo.io/json
          echo ""

      - name: Install WireGuard
        run: sudo apt-get install -y wireguard resolvconf

      - name: Connect ProtonVPN NL
        run: |
          sudo cp proton/wg-NL-FREE-31.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

      - name: Verify IP is in NL
        run: |
          echo "=== AFTER VPN — expected: NL ==="
          curl -s https://ipinfo.io/json
          echo ""
          COUNTRY=$(curl -s https://ipinfo.io/country | tr -d '[:space:]')
          echo "Country: $COUNTRY"
          if [ "$COUNTRY" = "NL" ]; then
            echo "✅ PASS — Netherlands confirmed"
          else
            echo "❌ FAIL — expected NL, got $COUNTRY"
            exit 1
          fi

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 || true


