name: VPN Geo Test

# Manual trigger only — does NOT affect monitor.yml
# Tests every WireGuard config in /proton/ sequentially
# Verifies each config routes traffic through the expected country

on:
  workflow_dispatch:

jobs:
  test-all-configs:
    name: Test all ProtonVPN WireGuard configs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WireGuard
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y wireguard resolvconf

      - name: Test all configs
        run: |
          set +e

          PASS=0
          FAIL=0
          RESULTS=""

          # Get country from IP — skips ipapi.co entirely (rate limits after 2 requests)
          # Uses ip-api.com (45 req/min, no key) then ipwho.is as fallback
          get_country() {
            local IP="$1"
            local COUNTRY=""

            # ip-api.com: 45 req/min free, no key needed, very reliable
            COUNTRY=$(curl -s --max-time 10 "http://ip-api.com/line/${IP}?fields=countryCode" 2>/dev/null | tr -d '[:space:]')
            if [[ ${#COUNTRY} -eq 2 && "$COUNTRY" =~ ^[A-Z]{2}$ ]]; then
              echo "$COUNTRY"; return
            fi

            # Fallback: ipwho.is
            COUNTRY=$(curl -s --max-time 10 "https://ipwho.is/${IP}" 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('country_code',''))" 2>/dev/null \
              | tr -d '[:space:]')
            if [[ ${#COUNTRY} -eq 2 && "$COUNTRY" =~ ^[A-Z]{2}$ ]]; then
              echo "$COUNTRY"; return
            fi

            # Fallback: geoplugin.net
            COUNTRY=$(curl -s --max-time 10 "http://www.geoplugin.net/json.gp?ip=${IP}" 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('geoplugin_countryCode',''))" 2>/dev/null \
              | tr -d '[:space:]')
            if [[ ${#COUNTRY} -eq 2 && "$COUNTRY" =~ ^[A-Z]{2}$ ]]; then
              echo "$COUNTRY"; return
            fi

            echo "UNKNOWN"
          }

          for CONF in proton/wg-*.conf; do
            BASENAME=$(basename "$CONF")

            # Skip files with spaces in name
            if [[ "$BASENAME" == *" "* ]]; then
              echo "⚠️  SKIP $BASENAME — filename contains spaces"
              RESULTS="$RESULTS\n⚠️  SKIP: $BASENAME (spaces in filename)"
              continue
            fi

            # Extract country code: wg-XX-FREE-N.conf → XX
            COUNTRY=$(echo "$BASENAME" | sed 's/wg-\([A-Z]*\)-.*/\1/')

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $BASENAME (expected: $COUNTRY)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            sudo cp "$CONF" /etc/wireguard/wg0.conf

            sudo wg-quick up wg0 2>&1
            if [ $? -ne 0 ]; then
              echo "❌ FAIL — wg-quick up failed"
              RESULTS="$RESULTS\n❌ FAIL (connect error): $BASENAME"
              FAIL=$((FAIL + 1))
              sudo wg-quick down wg0 2>/dev/null || true
              sudo rm -f /etc/wireguard/wg0.conf
              continue
            fi

            sleep 3

            # Get outbound IP via ip-api.com directly (avoids separate IP lookup then country lookup)
            RESPONSE=$(curl -s --max-time 10 "http://ip-api.com/json/?fields=query,countryCode" 2>/dev/null)
            ACTUAL_IP=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('query',''))" 2>/dev/null | tr -d '[:space:]')
            ACTUAL_COUNTRY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('countryCode',''))" 2>/dev/null | tr -d '[:space:]')

            # If ip-api.com failed, try ipwho.is for both
            if [[ -z "$ACTUAL_COUNTRY" || "$ACTUAL_COUNTRY" == "UNKNOWN" ]]; then
              RESPONSE2=$(curl -s --max-time 10 "https://ipwho.is/" 2>/dev/null)
              ACTUAL_IP=$(echo "$RESPONSE2" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ip',''))" 2>/dev/null | tr -d '[:space:]')
              ACTUAL_COUNTRY=$(echo "$RESPONSE2" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('country_code',''))" 2>/dev/null | tr -d '[:space:]')
            fi

            echo "IP: $ACTUAL_IP | Country: $ACTUAL_COUNTRY"

            if [ "$ACTUAL_COUNTRY" = "$COUNTRY" ]; then
              echo "✅ PASS — $BASENAME → $ACTUAL_IP ($ACTUAL_COUNTRY)"
              RESULTS="$RESULTS\n✅ PASS: $BASENAME → $ACTUAL_IP ($ACTUAL_COUNTRY)"
              PASS=$((PASS + 1))
            else
              echo "❌ FAIL — expected $COUNTRY, got $ACTUAL_COUNTRY ($ACTUAL_IP)"
              RESULTS="$RESULTS\n❌ FAIL: $BASENAME expected $COUNTRY, got $ACTUAL_COUNTRY ($ACTUAL_IP)"
              FAIL=$((FAIL + 1))
            fi

            sudo wg-quick down wg0 2>&1 || true
            sudo rm -f /etc/wireguard/wg0.conf

            # Pause between configs to stay under ip-api.com rate limit (45 req/min)
            sleep 2
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo -e "$RESULTS"
          echo ""
          echo "Passed: $PASS | Failed: $FAIL"

          if [ $FAIL -eq 0 ]; then
            echo "✅ ALL CONFIGS VERIFIED — safe to rebuild monitor.yml"
            exit 0
          else
            echo "❌ $FAIL CONFIG(S) FAILED"
            exit 1
          fi
