name: VPN Geo Test

# Manual trigger only — does NOT affect monitor.yml
#
# Tests every WireGuard config in /proton/ to verify:
#   1. wg-quick connects successfully on ubuntu-latest
#   2. The outbound IP country matches the config filename country code
#
# Single job — tests all configs sequentially, one at a time.
# Reports pass/fail per config and a final summary.
# Adding new configs to /proton/ requires no workflow changes.

on:
  workflow_dispatch:

jobs:
  test-all-configs:
    name: Test all ProtonVPN WireGuard configs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WireGuard
        run: sudo apt-get install -y wireguard resolvconf

      - name: Test all configs
        run: |
          set +e  # don't exit on first failure — test everything

          PASS=0
          FAIL=0
          RESULTS=""

          for CONF in proton/wg-*.conf; do
            # Skip files with spaces in name (e.g. "wg-SG-FREE-21 (1).conf")
            # wg-quick can't handle spaces in interface names
            BASENAME=$(basename "$CONF")
            if [[ "$BASENAME" == *" "* ]]; then
              echo "⚠️  SKIP $BASENAME — filename contains spaces, rename to use it"
              RESULTS="$RESULTS\n⚠️  SKIP: $BASENAME (spaces in filename)"
              continue
            fi

            # Extract country code from filename: wg-XX-FREE-N.conf → XX
            COUNTRY=$(echo "$BASENAME" | sed 's/wg-\([A-Z]*\)-.*/\1/')

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $BASENAME (expected country: $COUNTRY)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Copy config
            sudo cp "$CONF" /etc/wireguard/wg0.conf

            # Connect
            sudo wg-quick up wg0 2>&1
            if [ $? -ne 0 ]; then
              echo "❌ FAIL — wg-quick up failed for $BASENAME"
              RESULTS="$RESULTS\n❌ FAIL (connect error): $BASENAME"
              FAIL=$((FAIL + 1))
              sudo wg-quick down wg0 2>/dev/null || true
              sudo rm -f /etc/wireguard/wg0.conf
              continue
            fi

            sleep 3

            # Check IP
            ACTUAL_COUNTRY=$(curl -s --max-time 10 https://ipinfo.io/country | tr -d '[:space:]')
            ACTUAL_IP=$(curl -s --max-time 10 https://ipinfo.io/ip | tr -d '[:space:]')

            echo "IP: $ACTUAL_IP | Country: $ACTUAL_COUNTRY"

            if [ "$ACTUAL_COUNTRY" = "$COUNTRY" ]; then
              echo "✅ PASS — $BASENAME → $ACTUAL_IP ($ACTUAL_COUNTRY)"
              RESULTS="$RESULTS\n✅ PASS: $BASENAME → $ACTUAL_IP ($ACTUAL_COUNTRY)"
              PASS=$((PASS + 1))
            else
              echo "❌ FAIL — $BASENAME expected $COUNTRY, got $ACTUAL_COUNTRY ($ACTUAL_IP)"
              RESULTS="$RESULTS\n❌ FAIL: $BASENAME expected $COUNTRY, got $ACTUAL_COUNTRY ($ACTUAL_IP)"
              FAIL=$((FAIL + 1))
            fi

            # Disconnect and clean up before next config
            sudo wg-quick down wg0 2>&1 || true
            sudo rm -f /etc/wireguard/wg0.conf
            sleep 2
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo -e "$RESULTS"
          echo ""
          echo "Passed: $PASS | Failed: $FAIL"
          echo ""

          if [ $FAIL -eq 0 ]; then
            echo "✅ ALL CONFIGS VERIFIED — safe to rebuild monitor.yml with ProtonVPN WireGuard"
            exit 0
          else
            echo "❌ $FAIL CONFIG(S) FAILED — check results above before rebuilding monitor.yml"
            exit 1
          fi
