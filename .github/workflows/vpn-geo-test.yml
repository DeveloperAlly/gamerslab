  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test-nl, test-jp, test-ca, test-sg, test-ro, test-pl, test-mx]
    if: always()
    steps:
      - name: Results
        run: |
          echo "NL: ${{ needs.test-nl.result }}"
          echo "JP: ${{ needs.test-jp.result }}"
          echo "CA: ${{ needs.test-ca.result }}"
          echo "SG: ${{ needs.test-sg.result }}"
          echo "RO: ${{ needs.test-ro.result }}"
          echo "PL: ${{ needs.test-pl.result }}"
          echo "MX: ${{ needs.test-mx.result }}"

          PASS=true
          [ "${{ needs.test-nl.result }}" != "success" ] && PASS=false
          [ "${{ needs.test-jp.result }}" != "success" ] && PASS=false
          [ "${{ needs.test-ca.result }}" != "success" ] && PASS=false
          [ "${{ needs.test-sg.result }}" != "success" ] && PASS=false
          [ "${{ needs.test-ro.result }}" != "success" ] && PASS=false
          [ "${{ needs.test-pl.result }}" != "success" ] && PASS=false
          [ "${{ needs.test-mx.result }}" != "success" ] && PASS=false

          if [ "$PASS" = "true" ]; then
            echo "✅ ALL 7 REGIONS VERIFIED — safe to rebuild monitor.yml with ProtonVPN WireGuard"
          else
            echo "❌ ONE OR MORE REGIONS FAILED — do not rebuild monitor.yml yet"
            exit 1
          fi
