name: VPN Geo Test

# Manual trigger only — does NOT affect monitor.yml
# Tests every WireGuard config in /proton/ sequentially
# Uses multiple IP check services with fallback to avoid rate limiting

on:
  workflow_dispatch:

jobs:
  test-all-configs:
    name: Test all ProtonVPN WireGuard configs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WireGuard tools
        # ubuntu-latest has WireGuard built into the kernel already
        # Only need the userspace tools (wg, wg-quick) — much faster than full wireguard+resolvconf
        # DEBIAN_FRONTEND=noninteractive prevents apt hanging on interactive prompts
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends wireguard-tools openresolv

      - name: Test all configs
        run: |
          set +e

          PASS=0
          FAIL=0
          RESULTS=""

          # Get country from IP — tries multiple services with fallback to avoid rate limits
          get_country() {
            local IP="$1"
            local COUNTRY=""

            # Try ipapi.co first (generous free limit)
            COUNTRY=$(curl -s --max-time 8 "https://ipapi.co/${IP}/country/" 2>/dev/null | tr -d '[:space:]')
            if [[ ${#COUNTRY} -eq 2 && "$COUNTRY" =~ ^[A-Z]{2}$ ]]; then
              echo "$COUNTRY"; return
            fi

            # Fallback: ip-api.com (45 req/min free, no key)
            COUNTRY=$(curl -s --max-time 8 "http://ip-api.com/line/${IP}?fields=countryCode" 2>/dev/null | tr -d '[:space:]')
            if [[ ${#COUNTRY} -eq 2 && "$COUNTRY" =~ ^[A-Z]{2}$ ]]; then
              echo "$COUNTRY"; return
            fi

            # Fallback: ipwho.is
            COUNTRY=$(curl -s --max-time 8 "https://ipwho.is/${IP}" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('country_code',''))" 2>/dev/null | tr -d '[:space:]')
            if [[ ${#COUNTRY} -eq 2 && "$COUNTRY" =~ ^[A-Z]{2}$ ]]; then
              echo "$COUNTRY"; return
            fi

            echo "UNKNOWN"
          }

          for CONF in proton/wg-*.conf; do
            BASENAME=$(basename "$CONF")

            # Skip files with spaces in name — wg-quick can't handle them
            if [[ "$BASENAME" == *" "* ]]; then
              echo "⚠️  SKIP $BASENAME — filename contains spaces"
              RESULTS="$RESULTS\n⚠️  SKIP: $BASENAME (spaces in filename)"
              continue
            fi

            # Extract country code: wg-XX-FREE-N.conf → XX
            COUNTRY=$(echo "$BASENAME" | sed 's/wg-\([A-Z]*\)-.*/\1/')

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $BASENAME (expected: $COUNTRY)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            sudo cp "$CONF" /etc/wireguard/wg0.conf

            sudo wg-quick up wg0 2>&1
            if [ $? -ne 0 ]; then
              echo "❌ FAIL — wg-quick up failed"
              RESULTS="$RESULTS\n❌ FAIL (connect error): $BASENAME"
              FAIL=$((FAIL + 1))
              sudo wg-quick down wg0 2>/dev/null || true
              sudo rm -f /etc/wireguard/wg0.conf
              continue
            fi

            sleep 3

            # Get outbound IP
            ACTUAL_IP=$(curl -s --max-time 8 https://ipapi.co/ip/ 2>/dev/null | tr -d '[:space:]')
            if [[ -z "$ACTUAL_IP" ]]; then
              ACTUAL_IP=$(curl -s --max-time 8 https://api.ipify.org 2>/dev/null | tr -d '[:space:]')
            fi

            # Get country from IP
            ACTUAL_COUNTRY=$(get_country "$ACTUAL_IP")

            echo "IP: $ACTUAL_IP | Country: $ACTUAL_COUNTRY"

            if [ "$ACTUAL_COUNTRY" = "$COUNTRY" ]; then
              echo "✅ PASS — $BASENAME → $ACTUAL_IP ($ACTUAL_COUNTRY)"
              RESULTS="$RESULTS\n✅ PASS: $BASENAME → $ACTUAL_IP ($ACTUAL_COUNTRY)"
              PASS=$((PASS + 1))
            else
              echo "❌ FAIL — expected $COUNTRY, got $ACTUAL_COUNTRY ($ACTUAL_IP)"
              RESULTS="$RESULTS\n❌ FAIL: $BASENAME expected $COUNTRY, got $ACTUAL_COUNTRY ($ACTUAL_IP)"
              FAIL=$((FAIL + 1))
            fi

            sudo wg-quick down wg0 2>&1 || true
            sudo rm -f /etc/wireguard/wg0.conf

            # Brief pause between configs to avoid rate limiting on IP lookup APIs
            sleep 4
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo -e "$RESULTS"
          echo ""
          echo "Passed: $PASS | Failed: $FAIL"

          if [ $FAIL -eq 0 ]; then
            echo "✅ ALL CONFIGS VERIFIED — safe to rebuild monitor.yml"
            exit 0
          else
            echo "❌ $FAIL CONFIG(S) FAILED"
            exit 1
          fi
