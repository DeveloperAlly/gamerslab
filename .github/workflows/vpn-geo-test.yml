  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test-nl, test-jp, test-us, test-sg, test-ro, test-ca]
    if: always()
    steps:
      - name: Results
        run: |
          echo "NL: ${{ needs.test-nl.result }}"
          echo "JP: ${{ needs.test-jp.result }}"
          echo "US: ${{ needs.test-us.result }}"
          echo "SG: ${{ needs.test-sg.result }}"
          echo "RO: ${{ needs.test-ro.result }}"
          echo "CA: ${{ needs.test-ca.result }}"
          if [ "${{ needs.test-nl.result }}" = "success" ] && \
             [ "${{ needs.test-jp.result }}" = "success" ] && \
             [ "${{ needs.test-us.result }}" = "success" ] && \
             [ "${{ needs.test-sg.result }}" = "success" ] && \
             [ "${{ needs.test-ro.result }}" = "success" ] && \
             [ "${{ needs.test-ca.result }}" = "success" ]; then
            echo "✅ ALL 6 REGIONS VERIFIED — safe to rebuild monitor.yml with VPN"
          else
            echo "❌ ONE OR MORE REGIONS FAILED — do not rebuild monitor.yml yet"
            exit 1
          fi
