name: VPN Geo Test

# Manual trigger only — does NOT affect the monitor workflow
# Run this to verify ProtonVPN WireGuard geo-routing works on GitHub Actions runners
# before rebuilding the monitor workflow
#
# SETUP:
#   1. Create a free ProtonVPN account at https://protonvpn.com
#   2. Go to https://account.proton.me/u/0/vpn/WireGuard
#   3. Create a WireGuard config for each country and download the .conf file
#   4. Add each .conf file contents as a GitHub Actions secret:
#      PROTON_WG_NL  = Netherlands config
#      PROTON_WG_JP  = Japan config
#      PROTON_WG_US  = USA config
#      PROTON_WG_SG  = Singapore config
#      PROTON_WG_RO  = Romania config
#      PROTON_WG_CA  = Canada config
#   5. Run this workflow manually from the Actions tab
#
# SUCCESS CRITERIA:
#   Each job must show a different IP and country in the "IP after VPN" step
#   compared to the "IP before VPN" step, and the country must match the VPN region.

on:
  workflow_dispatch:

jobs:

  test-nl:
    name: Test Netherlands (NL)
    runs-on: ubuntu-latest
    steps:
      - name: IP before VPN
        run: |
          echo "=== BEFORE VPN ==="
          curl -s https://ipinfo.io/json
          echo ""

      - name: Install WireGuard
        run: sudo apt-get install -y wireguard resolvconf

      - name: Connect ProtonVPN NL
        run: |
          echo "${{ secrets.PROTON_WG_NL }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo wg-quick up wg0
          sleep 3

      - name: IP after VPN (must show NL)
        run: |
          echo "=== AFTER VPN — expected country: NL ==="
          curl -s https://ipinfo.io/json
          echo ""
          COUNTRY=$(curl -s https://ipinfo.io/country)
          echo "Country code: $COUNTRY"
          if [ "$COUNTRY" = "NL" ]; then
            echo "✅ PASS — IP is in Netherlands"
          else
            echo "❌ FAIL — expected NL, got $COUNTRY"
            exit 1
          fi

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 || true

  test-jp:
    name: Test Japan (JP)
    runs-on: ubuntu-latest
    steps:
